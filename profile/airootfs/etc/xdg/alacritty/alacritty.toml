# KKjorsvik OS — system-wide alacritty theme (Gruvbox Material).
# Per-user ~/.config/alacritty/alacritty.toml (e.g. from dotfiles) overrides this.

[font]
size = 11.0

[font.normal]
family = "JetBrainsMono Nerd Font"

[colors.primary]
background = "#282828"
foreground = "#e0cfa0"

[colors.normal]
black   = "#282828"
red     = "#ea6962"
green   = "#a9b665"
yellow  = "#d8a657"
blue    = "#7daea3"
magenta = "#d3869b"
cyan    = "#89b482"
white   = "#d4be98"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#bcc44a"
yellow  = "#ecb142"
blue    = "#8ec0a8"
magenta = "#e08bab"
cyan    = "#9bcb72"
white   = "#e0cfa0"
